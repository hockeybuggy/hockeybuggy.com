# Based on https://www.specialcase.dev/blog/sharing-steps-in-github-action-workflows/

name: "Shared Rust setup"
description: "Installs the Rust toolchain and restores the Cargo cache."
inputs:
  components:
    description: "Extra rustup components to install (comma separated)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}

    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ github.workspace }}/ssg/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('ssg/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
