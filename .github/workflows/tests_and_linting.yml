name: tests

on: [push]

jobs:
  rust-checks:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Cache Cargo registry and build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ${{ github.workspace }}/ssg/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('ssg/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: cargo fmt
      run: cargo fmt --manifest-path ssg/Cargo.toml --check
    - name: cargo clippy
      run: cargo clippy --manifest-path ssg/Cargo.toml --all-targets -- -D warnings
    - name: cargo test
      run: cargo test --manifest-path ssg/Cargo.toml


  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/build-site


  run-prebuild-tests:
    needs: build
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/shared-setup
    - uses: ./.github/actions/build-site
    - name: Run Tests
      env:
        CI: true
      run: |
        yarn run test:prebuild --verbose


  run-end-to-end-tests:
    needs: build
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/shared-setup
    - uses: ./.github/actions/build-site
    - name: Run Tests
      env:
        CI: true
      run: |
        yarn run test:e2e --verbose
    - uses: actions/upload-artifact@v4
      with:
        name: e2e_test_screenshots
        path: e2e_tests/screenshots
