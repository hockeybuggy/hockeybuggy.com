{% extends "base.html" %}
{% block content %}
<h1>Blog Posts</h1>
{% for post in posts %}
<article>
  <header>
    <small>
      <time datetime="{{ post.iso_date }}">{{ post.human_date }}</time>
    </small>
    <h2 style="margin:0;margin-bottom:1.8rem"><a href="{{ post.url }}">{{ post.title }}</a></h2>
  </header>
  <hr />
</article>
{% endfor %}
{% endblock %}
