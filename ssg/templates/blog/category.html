{% extends "base.html" %}
{% block content %}
<h1>{{ posts | length }} post{% if posts | length != 1 %}s{% endif %} in the category "{{ category }}"</h1>
<ul>
  {% for post in posts %}
  <li><a href="{{ post.url }}">{{ post.title }}</a></li>
  {% endfor %}
</ul>
<a href="/blog/categories">All categories</a>
{% endblock %}
