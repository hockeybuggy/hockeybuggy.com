<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/static/img/favicon.ico" />
  <link rel="stylesheet" href="/styles/main.css" />
  {% if show_rss_link %}<link rel="alternate" type="application/atom+xml" href="/blog/index.xml" title="Hockeybuggy.com" />{% endif %}
  {% if description is defined and description %}<meta name="description" content="{{ description }}" />{% endif %}
</head>
<body>
  <main class="wrapper">
    <div class="header">
      <nav class="navigation">
        <div class="container">
          <a href="/" class="navigation-title{% if pathname == '/' %} active{% endif %}">hockeybuggy.com</a>
          <button
            id="menu-button"
            class="menu-button"
            aria-label="Toggle navigation"
            aria-controls="menu-inner"
            aria-expanded="false"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" aria-hidden="true" focusable="false" width="24px" fill="currentColor">
              <path d="M0 96C0 78.3 14.3 64 32 64H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32H416c17.7 0 32 14.3 32 32s-14.3 32-32 32H32c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32s14.3-32 32-32H416c17.7 0 32 14.3 32 32z"/>
            </svg>
          </button>
          <ul
            class="navigation-list"
            id="menu-inner"
            role="menu"
            aria-labelledby="menu-button"
            data-expanded="false"
          >
            <li class="navigation-item" role="menuitem"{% if pathname == "/" %} aria-current="page"{% endif %}>
              <a href="/">Home</a>
            </li>
            <li class="navigation-item" role="menuitem"{% if pathname == "/blog/" %} aria-current="page"{% endif %}>
              <a href="/blog/">Blog</a>
            </li>
            <li class="navigation-item" role="menuitem"{% if pathname == "/projects/" %} aria-current="page"{% endif %}>
              <a href="/projects/">Projects</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
    <div class="content">
      <section class="container{% if class %} {{ class }}{% endif %}">
        {% block content %}{% endblock %}
      </section>
    </div>
    <footer class="footer">
      <section class="container">
        <div id="footer--first-line">
          <p>I go by both Doug or Douglas. He/Him</p>
        </div>
        <div id="footer--second-line">
          <a href="https://creativecommons.org/licenses/by/4.0/" aria-label="Creative commons licence">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 496 512" aria-hidden="true" focusable="false" fill="currentColor">
              <path d="M245.83 214.87l-33.22 17.28c-9.43-19.58-25.24-19.93-27.46-19.93-22.13 0-33.22 14.61-33.22 43.84 0 23.57 9.21 43.84 33.22 43.84 14.47 0 24.65-7.09 30.57-21.26l30.55 15.5c-6.17 11.51-25.69 38.98-65.1 38.98-22.6 0-73.96-10.32-73.96-77.05 0-58.69 43-77.06 72.63-77.06 30.72-.01 52.7 11.95 65.99 35.86zm143.05 0l-32.78 17.28c-9.5-19.77-25.72-19.93-27.9-19.93-22.14 0-33.22 14.61-33.22 43.84 0 23.55 9.23 43.84 33.22 43.84 14.45 0 24.65-7.09 30.54-21.26l31 15.5c-2.1 3.75-21.39 38.98-65.09 38.98-22.69 0-73.96-9.87-73.96-77.05 0-58.67 42.97-77.06 72.63-77.06 30.71-.01 52.58 11.95 65.56 35.86zM247.56 8.05C104.74 8.05 0 123.11 0 256.05c0 138.49 113.6 248 247.56 248 129.93 0 248.44-100.87 248.44-248 0-137.87-106.62-248-248.44-248zm.87 450.81c-112.54 0-203.7-93.04-203.7-202.81 0-105.42 85.43-203.27 203.72-203.27 112.53 0 202.82 89.46 202.82 203.26-.01 121.69-99.68 202.82-202.84 202.82z"/>
            </svg>
          </a>
          {% if show_rss_link %}
          <a href="/blog/index.xml" aria-label="blog atom feed">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" aria-hidden="true" focusable="false" fill="currentColor">
              <path d="M0 64C0 46.3 14.3 32 32 32c229.8 0 416 186.2 416 416c0 17.7-14.3 32-32 32s-32-14.3-32-32C384 253.6 226.4 96 32 96C14.3 96 0 81.7 0 64zM0 416a64 64 0 1 1 128 0A64 64 0 1 1 0 416zM32 160c159.1 0 288 128.9 288 288c0 17.7-14.3 32-32 32s-32-14.3-32-32c0-123.7-100.3-224-224-224c-17.7 0-32-14.3-32-32s14.3-32 32-32z"/>
            </svg>
          </a>
          {% endif %}
          <span>©2026</span>
        </div>
      </section>
    </footer>
  </main>
  <script defer src="/assets/nav.js"></script>
</body>
</html>
